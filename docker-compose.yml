services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: meeting_transcriber
      POSTGRES_USER: meeting
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meeting -d meeting_transcriber"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [private]
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [private]
  web:
    build: .
    restart: unless-stopped
    init: true
    security_opt: ["no-new-privileges:true"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://meeting:${POSTGRES_PASSWORD}@postgres:5432/meeting_transcriber
      REDIS_URL: redis://redis:6379
      STORAGE_ROOT: /data
    ports: ["${APP_BIND_IP:-127.0.0.1}:6982:6982"]
    volumes: ["./data:/data"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [private]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:6982/api/health').then(r=>{if(r.status>=500)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
  worker:
    build: .
    restart: unless-stopped
    init: true
    security_opt: ["no-new-privileges:true"]
    command: ["npm", "run", "worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://meeting:${POSTGRES_PASSWORD}@postgres:5432/meeting_transcriber
      REDIS_URL: redis://redis:6379
      STORAGE_ROOT: /data
    volumes: ["./data:/data"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [private]
networks:
  private: { driver: bridge }
volumes:
  postgres-data:
  redis-data:
